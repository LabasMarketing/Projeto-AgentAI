version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: projeto_agentai_n8n
    ports:
      - "${N8N_PORT}:5678"
    environment:
      - TZ=${TZ}
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - NODE_ENV=production
      - WEBHOOK_URL=${WEBHOOK_URL}
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL}
      - N8N_PROXY_HOPS=1
    volumes:
      - ./n8n_data:/home/node/.n8n
      - ./data:/data
      - ./prompts:/prompts
      - ./outputs:/outputs
      - ./schemas:/schemas
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - agentai_network
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: projeto_agentai_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - TZ=${TZ}
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_URL=http://host.docker.internal:11434
      - BROWSER_AUTOMATION_ENABLED=false
    volumes:
      - .:/app
      - ./outputs:/app/outputs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - agentai_network
    restart: unless-stopped

networks:
  agentai_network:
    driver: bridge
